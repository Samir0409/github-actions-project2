name: Nodeproject1
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@v3
      - name: install dependencies
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: install_dependencies
        run: npm ci
      - name: run_tests
        run: npm run
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@v3
      - name: install dependencies
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: install_dependencies
        run: npm ci
      - name: build_proj
        run: npm run build
      - name: deploy_to_server
        run: echo "deploying to server"